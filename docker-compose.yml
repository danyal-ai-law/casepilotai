version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: casepilot_postgres
    environment:
      POSTGRES_USER: casepilot
      POSTGRES_PASSWORD: casepilot_password
      POSTGRES_DB: casepilotai_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - casepilot_network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: casepilot_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - casepilot_network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: casepilot_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - casepilot_network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: casepilot_backend
    environment:
      DATABASE_URL: postgresql://casepilot:casepilot_password@postgres:5432/casepilotai_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      JWT_SECRET_KEY: your-jwt-secret-key
      SECRET_KEY: your-secret-key
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
      - rabbitmq
    networks:
      - casepilot_network
    restart: unless-stopped

  frontend:
    image: node:18-alpine
    container_name: casepilot_frontend
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    networks:
      - casepilot_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  casepilot_network:
    driver: bridge
